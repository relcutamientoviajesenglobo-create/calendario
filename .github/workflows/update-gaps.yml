name: Update WE FLY gaps

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '_sistema/**'
      - '.github/workflows/update-gaps.yml'

concurrency:
  group: update-gaps
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Recreate _sistema/.env from secrets
        run: |
          set +e
          mkdir -p _sistema
          {
            echo "TURITOP_M1_SHORT_ID=${{ secrets.TURITOP_M1_SHORT_ID }}"
            echo "TURITOP_M1_SECRET_KEY=${{ secrets.TURITOP_M1_SECRET_KEY }}"
            echo "TURITOP_M1_LABEL=Globos Aerostaticos Teotihuacan"
            echo "TURITOP_M2_SHORT_ID=${{ secrets.TURITOP_M2_SHORT_ID }}"
            echo "TURITOP_M2_SECRET_KEY=${{ secrets.TURITOP_M2_SECRET_KEY }}"
            echo "TURITOP_M2_LABEL=Vuelos en Globo MX"
            echo "APPS_SCRIPT_URL=${{ secrets.APPS_SCRIPT_URL }}"
          } > _sistema/.env
          lines=$(wc -l < _sistema/.env)
          echo "[step 3] env creado: $lines lineas"
          exit 0

      - name: Refresh Turitop bookings (best-effort)
        run: |
          set +e
          cd _sistema
          python3 wefly_turitop_client.py 2>&1
          rc=$?
          if [ $rc -eq 0 ] && [ -f turitop_bookings.json ]; then
            cp turitop_bookings.json gap-detector/turitop_all.json
            echo "[step 4] Turitop OK"
          else
            echo "[step 4] Turitop falló (rc=$rc). Usando turitop_all.json previo."
          fi
          exit 0

      - name: Build calendar_events.json
        run: |
          set +e
          cd _sistema/gap-detector
          python3 build_calendar_events.py 2>&1
          rc=$?
          echo "[step 5] build_calendar_events rc=$rc"
          exit 0

      - name: Run gap detector
        run: |
          set +e
          cd _sistema/gap-detector
          python3 gap_detector.py 2>&1
          rc=$?
          echo "[step 6] gap_detector rc=$rc"
          exit 0

      - name: Stage and detect changes
        id: changes
        run: |
          set +e
          git add -A 2>&1
          git reset -- _sistema/.env _sistema/turitop_raw_M1.json _sistema/turitop_raw_M2.json _sistema/turitop_bookings.json >/dev/null 2>&1
          git diff --cached --quiet
          rc=$?
          if [ $rc -eq 0 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "[step 7] Sin cambios."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "[step 7] Archivos modificados:"
            git diff --cached --name-only
          fi
          exit 0

      - name: Commit & push (best-effort)
        if: steps.changes.outputs.changed == 'true'
        run: |
          set +e
          git config user.name  "wefly-bot"
          git config user.email "wefly-bot@users.noreply.github.com"
          git commit -m "auto: refresh gaps $(date -u +%Y-%m-%dT%H:%MZ)" 2>&1
          commit_rc=$?
          echo "[step 8a] commit rc=$commit_rc"
          if [ $commit_rc -ne 0 ]; then
            exit 0
          fi
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin HEAD:main 2>&1
          push_rc=$?
          echo "[step 8b] push rc=$push_rc"
          if [ $push_rc -ne 0 ]; then
            echo "HINT: Settings → Actions → General → Workflow permissions → 'Read and write permissions'"
          fi
          exit 0

      - name: Write job summary
        if: always()
        run: |
          set +e
          python3 .github/workflows/summary.py 2>&1
          rc=$?
          echo "[step 9] summary rc=$rc"
          exit 0

name: Update WE FLY gaps

on:
  schedule:
    - cron: '0 */2 * * *'        # cada 2 horas UTC
  workflow_dispatch: {}          # botón manual
  push:
    branches: [main]
    paths:
      - '_sistema/**'
      - '.github/workflows/update-gaps.yml'

concurrency:
  group: update-gaps
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Recreate _sistema/.env from secrets
        run: |
          mkdir -p _sistema
          {
            echo "TURITOP_M1_SHORT_ID=${{ secrets.TURITOP_M1_SHORT_ID }}"
            echo "TURITOP_M1_SECRET_KEY=${{ secrets.TURITOP_M1_SECRET_KEY }}"
            echo "TURITOP_M1_LABEL=Globos Aerostaticos Teotihuacan"
            echo "TURITOP_M2_SHORT_ID=${{ secrets.TURITOP_M2_SHORT_ID }}"
            echo "TURITOP_M2_SECRET_KEY=${{ secrets.TURITOP_M2_SECRET_KEY }}"
            echo "TURITOP_M2_LABEL=Vuelos en Globo MX"
            echo "APPS_SCRIPT_URL=${{ secrets.APPS_SCRIPT_URL }}"
          } > _sistema/.env
          echo "✅ .env creado ($(wc -l < _sistema/.env) líneas)"

      - name: Refresh Turitop bookings (best-effort)
        id: turitop
        run: |
          set +e
          cd _sistema
          python3 wefly_turitop_client.py
          rc=$?
          if [ $rc -eq 0 ] && [ -f turitop_bookings.json ]; then
            cp turitop_bookings.json gap-detector/turitop_all.json
            echo "✅ Turitop refresh OK"
            echo "turitop_ok=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Turitop no disponible (rc=$rc). Usando turitop_all.json del último commit."
            echo "turitop_ok=false" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Build calendar_events.json (via Apps Script)
        run: |
          cd _sistema/gap-detector
          python3 build_calendar_events.py

      - name: Run gap detector
        run: |
          cd _sistema/gap-detector
          python3 gap_detector.py

      - name: Stage and detect changes
        id: changes
        run: |
          # Solo trackeamos cambios en archivos relevantes (evita basura temporal)
          git add -A
          # Excluir _sistema/.env y archivos raw que no necesitan historial
          git reset -- _sistema/.env _sistema/turitop_raw_M1.json _sistema/turitop_raw_M2.json _sistema/turitop_bookings.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Sin cambios."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Archivos modificados:"
            git diff --cached --name-only
          fi

      - name: Commit & push (best-effort)
        if: steps.changes.outputs.changed == 'true'
        run: |
          set +e
          git config user.name  "wefly-bot"
          git config user.email "wefly-bot@users.noreply.github.com"
          git commit -m "auto: refresh gaps $(date -u +%Y-%m-%dT%H:%MZ)"
          commit_rc=$?
          if [ $commit_rc -ne 0 ]; then
            echo "⚠️  Commit falló (rc=$commit_rc). Abortando push."
            exit 0
          fi
          # Reescribir remote con token explícito para asegurar auth
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin HEAD:main 2>&1
          push_rc=$?
          if [ $push_rc -eq 0 ]; then
            echo "✅ Push OK"
          else
            echo "⚠️  Push falló (rc=$push_rc). Probable causa: Actions no tiene write permissions."
            echo "    Ve a: Settings → Actions → General → Workflow permissions"
            echo "    → Marca 'Read and write permissions' → Save."
          fi
          exit 0

      - name: Write job summary
        if: always()
        run: python3 .github/workflows/summary.py
